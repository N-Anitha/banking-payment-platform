# ============================================================
# azure-pipelines.yaml — Main CI/CD Pipeline
# Banking Payment Processing Platform
# Triggers on: develop and main branches
# ============================================================

trigger:
  branches:
    include:
      - develop
      - main
  paths:
    include:
      - payment-service/*

pr:
  branches:
    include:
      - develop
      - main

# ── Variables from Library (Variable Groups) ──────────────
variables:
  - group: banking-dev-variables       # ACR_NAME, IMAGE_NAME, NAMESPACE
  - name: imageTag
    value: $(Build.BuildId)
  - name: serviceName
    value: 'payment-service'

# ============================================================
# STAGE 1: BUILD + CODE QUALITY + DOCKER PUSH
# ============================================================
stages:
  - stage: Build
    displayName: '🔨 Build & Code Quality'
    jobs:
      - job: BuildJob
        displayName: 'Maven Build + SonarQube + Docker Push'
        pool:
          name: 'Default'              # Self-hosted agent (private network access)
        steps:

          # Step 1 — Checkout code
          - checkout: self
            displayName: 'Checkout Source Code'

          # Step 2 — Maven Build + Unit Tests
          - task: Maven@3
            displayName: '☕ Maven Build & Unit Tests'
            inputs:
              mavenPomFile: '$(serviceName)/pom.xml'
              goals: 'clean package'
              options: '-DskipTests=false'
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.17'

          # Step 3 — SonarQube Prepare
          - task: SonarQubePrepare@5
            displayName: '🔍 Prepare SonarQube Analysis'
            inputs:
              SonarQube: 'sonar-service-connection'
              scannerMode: 'Auto'
              projectKey: 'banking-payment-service'
              projectName: 'Banking Payment Service'
              extraProperties: |
                sonar.coverage.jacoco.xmlReportPaths=$(Agent.BuildDirectory)/coverage.xml
                sonar.java.coveragePlugin=jacoco

          # Step 4 — SonarQube Analysis
          - task: SonarQubeAnalyze@5
            displayName: '🔍 Run SonarQube Analysis'

          # Step 5 — SonarQube Quality Gate Check
          - task: SonarQubePublish@5
            displayName: '✅ Check Quality Gate (80% coverage required)'
            inputs:
              pollingTimeoutSec: '300'

          # Step 6 — Docker Build & Push to ACR
          - task: Docker@2
            displayName: '🐳 Build & Push Docker Image to ACR'
            inputs:
              command: buildAndPush
              repository: $(serviceName)
              containerRegistry: 'acr-service-connection'
              dockerfile: '$(serviceName)/Dockerfile'
              tags: |
                $(imageTag)
                latest

          # Step 7 — Publish pipeline artifact (deployment yaml)
          - task: PublishPipelineArtifact@1
            displayName: '📦 Publish K8s Manifests'
            inputs:
              targetPath: 'k8s'
              artifact: 'k8s-manifests'

# ============================================================
# STAGE 2: DEPLOY TO DEV
# ============================================================
  - stage: DeployDev
    displayName: '🚀 Deploy to DEV'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployDev
        displayName: 'Deploy to DEV AKS'
        pool:
          name: 'Default'
        environment: 'DEV'             # No approval needed
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/deploy-template.yaml
                  parameters:
                    namespace: 'banking-dev'
                    imageTag: $(imageTag)
                    serviceName: $(serviceName)
                    replicas: '1'

# ============================================================
# STAGE 3: DEPLOY TO QA
# ============================================================
  - stage: DeployQA
    displayName: '🧪 Deploy to QA'
    dependsOn: DeployDev
    condition: succeeded()
    jobs:
      - deployment: DeployQA
        displayName: 'Deploy to QA AKS'
        pool:
          name: 'Default'
        environment: 'QA'              # QA Lead approval configured in Environment
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/deploy-template.yaml
                  parameters:
                    namespace: 'banking-qa'
                    imageTag: $(imageTag)
                    serviceName: $(serviceName)
                    replicas: '2'

# ============================================================
# STAGE 4: DEPLOY TO PRODUCTION
# ============================================================
  - stage: DeployProd
    displayName: '🏦 Deploy to PRODUCTION'
    dependsOn: DeployQA
    condition: |
      and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProd
        displayName: 'Deploy to PROD AKS'
        pool:
          name: 'Default'
        environment: 'PRODUCTION'      # Tech Lead manual approval gate
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/deploy-template.yaml
                  parameters:
                    namespace: 'banking-prod'
                    imageTag: $(imageTag)
                    serviceName: $(serviceName)
                    replicas: '3'

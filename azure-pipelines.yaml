# ============================================================
# azure-pipelines.yaml — Main CI/CD Pipeline
# Banking Payment Processing Platform
# ============================================================

trigger:
  branches:
    include:
      - develop
      - main
  paths:
    include:
      - payment-service/*

pr:
  branches:
    include:
      - develop
      - main

variables:
  - group: banking-dev-variables
  - name: imageTag
    value: $(Build.BuildId)
  - name: serviceName
    value: 'payment-service'

stages:
  - stage: Build
    displayName: '🔨 Build & Code Quality'
    jobs:
      - job: BuildJob
        displayName: 'Maven Build + Docker Push'
        pool:
          name: 'Default'
        steps:

          - checkout: self
            displayName: 'Checkout Source Code'

          - task: Maven@3
            displayName: '☕ Maven Build & Unit Tests'
            inputs:
              mavenPomFile: '$(serviceName)/pom.xml'
              goals: 'clean package'
              options: '-DskipTests=false'
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.17'

          # SonarQube - TODO: Enable after SonarQube setup
          # - task: SonarQubePrepare@5
          #   inputs:
          #     SonarQube: 'sonar-service-connection'
          #     scannerMode: 'Auto'
          #     projectKey: 'banking-payment-service'
          # - task: SonarQubeAnalyze@5
          # - task: SonarQubePublish@5
          #   inputs:
          #     pollingTimeoutSec: '300'

          - task: Docker@2
            displayName: '🐳 Build & Push Docker Image to ACR'
            inputs:
              command: buildAndPush
              repository: $(serviceName)
              containerRegistry: 'acr-service-connection'
              dockerfile: '$(serviceName)/Dockerfile'
              tags: |
                $(imageTag)
                latest

          - task: PublishPipelineArtifact@1
            displayName: '📦 Publish K8s Manifests'
            inputs:
              targetPath: 'k8s'
              artifact: 'k8s-manifests'

  - stage: DeployDev
    displayName: '🚀 Deploy to DEV'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployDev
        displayName: 'Deploy to DEV AKS'
        pool:
          name: 'Default'
        environment: 'DEV'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/deploy-template.yaml
                  parameters:
                    namespace: 'banking-dev'
                    imageTag: $(imageTag)
                    serviceName: $(serviceName)
                    replicas: '1'

  - stage: DeployQA
    displayName: '🧪 Deploy to QA'
    dependsOn: DeployDev
    condition: succeeded()
    jobs:
      - deployment: DeployQA
        displayName: 'Deploy to QA AKS'
        pool:
          name: 'Default'
        environment: 'QA'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/deploy-template.yaml
                  parameters:
                    namespace: 'banking-qa'
                    imageTag: $(imageTag)
                    serviceName: $(serviceName)
                    replicas: '2'

  - stage: DeployProd
    displayName: '🏦 Deploy to PRODUCTION'
    dependsOn: DeployQA
    condition: |
      and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProd
        displayName: 'Deploy to PROD AKS'
        pool:
          name: 'Default'
        environment: 'PRODUCTION'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/deploy-template.yaml
                  parameters:
                    namespace: 'banking-prod'
                    imageTag: $(imageTag)
                    serviceName: $(serviceName)
                    replicas: '3'

# ============================================================
# docker-compose.yaml
# Local Development Setup — Run all services locally
# ============================================================

version: '3.8'

services:

  # ── Payment Service ───────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILE=dev
      - DB_PASSWORD=localpassword
    networks:
      - banking-network
    depends_on:
      - elasticsearch

  # ── Transaction Service ───────────────────────────────────
  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILE=dev
    networks:
      - banking-network

  # ── Notification Service ──────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILE=dev
    networks:
      - banking-network

  # ── ELK Stack ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks:
      - banking-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    ports:
      - "5044:5044"
    volumes:
      - ./elk-stack/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    networks:
      - banking-network
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    ports:
      - "5601:5601"                        # Access Kibana at http://localhost:5601
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - banking-network
    depends_on:
      - elasticsearch

networks:
  banking-network:
    driver: bridge

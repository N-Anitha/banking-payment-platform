# ============================================================
# elk-stack/filebeat-daemonset.yaml
# Filebeat — Ships logs from ALL pods to Logstash
# DaemonSet runs one Filebeat pod on every AKS node
# ============================================================

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: banking-prod
  labels:
    app: filebeat
spec:
  selector:
    matchLabels:
      app: filebeat
  template:
    metadata:
      labels:
        app: filebeat
    spec:
      serviceAccountName: filebeat
      containers:
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.11.0
          args: ["-c", "/etc/filebeat/filebeat.yml", "-e"]
          env:
            - name: LOGSTASH_HOST
              value: "logstash-service:5044"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/filebeat/
              readOnly: true
            - name: varlogcontainers
              mountPath: /var/log/containers    # All pod logs location
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
          resources:
            requests:
              memory: "100Mi"
              cpu: "100m"
            limits:
              memory: "200Mi"
              cpu: "200m"

      volumes:
        - name: config
          configMap:
            name: filebeat-config
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods

---
# ============================================================
# Filebeat Configuration
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: banking-prod
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log     # Collect from all containers
        processors:
          - add_kubernetes_metadata:      # Add pod/namespace/service info
              host: ${NODE_NAME}
              matchers:
                - logs_path:
                    logs_path: "/var/log/containers/"

    # Filter — only collect banking service logs
    processors:
      - drop_event:
          when:
            not:
              or:
                - contains:
                    kubernetes.labels.team: "payments"
                - contains:
                    kubernetes.labels.app: "payment-service"
                - contains:
                    kubernetes.labels.app: "transaction-service"
                - contains:
                    kubernetes.labels.app: "notification-service"

    output.logstash:
      hosts: ["${LOGSTASH_HOST}"]         # Send to Logstash
      bulk_max_size: 2048
